services:
  labs-api:
    build: .
    container_name: labs-api
    restart: unless-stopped
    depends_on:
      labs-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://labsuser:labspass@labs-db:5432/labsdb
      ADMIN_TOKEN: ${ADMIN_TOKEN:-changeme-boardwalk-2026}
      UPLOAD_DIR: /app/uploads
      UPLOAD_URL_PREFIX: /api/uploads
    volumes:
      - labs-uploads:/app/uploads
    ports:
      - "127.0.0.1:8002:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  labs-db:
    image: postgres:16-alpine
    container_name: labs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: labsuser
      POSTGRES_PASSWORD: labspass
      POSTGRES_DB: labsdb
    volumes:
      - labs-pg-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labsuser -d labsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  labs-pg-data:
  labs-uploads:
